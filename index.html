<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Socios</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenido</h1>
        <p>Ingresa tus datos para continuar</p>
        
        <div class="form-group">
            <input type="text" id="nameSearch" placeholder="Busca tu nombre..." autocomplete="off">
            <div id="results" class="autocomplete-results hidden"></div>
			<div id="idSection" class="form-group hidden">
				<input type="password" id="userId" placeholder="Ingresa tu ID">
			</div>
        </div>

        <button class="btn btn-primary" id="loginBtn">Acceder</button>
    </div>
    <script src="app/app.js"></script>
</body>
</html>
