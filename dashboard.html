<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="userName">Hola, Socio</h1>
        <p>Actualiza tu número de contacto</p>        <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" id="userWhatsApp" placeholder="Ej: 521234567890">
        </div>

        <button class="btn btn-primary" onclick="updateData()">Actualizar</button>
        <button class="btn btn-ghost" onclick="logout()">¿No eres esta persona? Volver a ingresar</button>
    </div>
    <script src="app.js"></script>
    <script>
        // Cargar datos al iniciar
        document.getElementById('userName').innerText = localStorage.getItem('name') || 'Socio';
        document.getElementById('userWhatsApp').value = localStorage.getItem('whatsapp') || '';
    </script>
</body>
</html>
