<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asesoría personalizada</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1 id="landingTitle">Asesoría personalizada</h1>
    <p>
      Haz clic en el botón de abajo para recibir información directamente
      por WhatsApp.
    </p>

    <a
      href="#"
      id="waLink"
      class="btn whatsapp-btn"
      style="display:none;"
      target="_blank"
    >
      Contactar por WhatsApp
    </a>
  </div>

  <script src="app/app.js?v=1.0.1"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("user");

    if (slug) {
      loadLanding(slug);
    }
  </script>
</body>
</html>
